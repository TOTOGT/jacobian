name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Download Mathlib build cache
        run: lake exe cache get

      - name: Build project and verify proofs
        run: lake build
      
      - name: Download Mathlib build cache (best-effort)
        run: lake exe cache get || true

      - name: Build project and verify proofs
        run: lake build
      
      - name: Ensure Lake dependencies are fetched
        run: | 
          set -euo pipefail
          lake update
          echo "Listing mathlib LinearAlgebra directory:"
          ls -la .lake/packages/mathlib/Mathlib/LinearAlgebra || true
      - name: Install Elan (Lean toolchain manager)
        run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Ensure Lake dependencies are fetched
        run: |
        set -euo pipefail
        lake update
        echo "Listing mathlib LinearAlgebra directory (after lake update):"
        ls -la .lake/packages/mathlib/Mathlib/LinearAlgebra || true

      - name: Download Mathlib build cache (best-effort)
        run: lake exe cache get || true

      - name: Build project and verify proofs
        run: lake build
       - name: Install Elan (Lean toolchain manager)
        run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH
    

      - name: Ensure Lake dependencies are fetched
        run: |
        set -euo pipefail
          lake update
          echo "Listing mathlib LinearAlgebra directory (after lake update):"
          ls -la .lake/packages/mathlib/Mathlib/LinearAlgebra || true

        - name: Download Mathlib build cache (best-effort)
        run: lake exe cache get || true

- name: Build project and verify proofs
